name: Build & Deploy Docs Snippets

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install markdown bleach

      - name: Fetch existing manifest for merge
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          git show origin/gh-pages:snippets/mbi/V1.0.0.2/manifest.json \
            > /tmp/prior-manifest.json 2>/dev/null \
            || echo '[]' > /tmp/prior-manifest.json

      - name: Build snippets
        run: |
          python scripts/build_snippets.py
        env:
          DOCS_VERSION: V1.0.0.2
          PRIOR_MANIFEST_PATH: /tmp/prior-manifest.json

      - name: Upload artifact (debugging)
        uses: actions/upload-artifact@v4
        with:
          name: snippets
          path: public/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true